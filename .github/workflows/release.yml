name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Resolve tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${TAG#v}" >> $GITHUB_ENV
          echo "Releasing: ${TAG}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Verify dist
        run: |
          test -f dist/index.js || { echo "dist/index.js not found"; exit 1; }
          echo "dist/index.js: $(wc -c < dist/index.js) bytes"

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish packages
        run: |
          VERSION="${RELEASE_VERSION}"
          publish_pkg() {
            local name="$1"
            if npm view "${name}@${VERSION}" version > /dev/null 2>&1; then
              echo "✓ ${name}@${VERSION} already published — skipping"
              return 0
            fi
            node -e "
              const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
              pkg.name = '${name}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            if npm publish --provenance --access public; then
              echo "✓ ${name}@${VERSION} published"
            else
              echo "⚠ ${name}@${VERSION} publish failed — continuing"
            fi
          }
          publish_pkg "pixverse"
          publish_pkg "@pixverse-ai/cli"
          publish_pkg "pixverse-cli"
          publish_pkg "pixverse-ai-cli"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          sleep 15
          VERSION="${RELEASE_VERSION}"
          npm view @pixverse-ai/cli@${VERSION} version
          npm view pixverse-cli@${VERSION} version
          npm view pixverse-ai-cli@${VERSION} version

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${RELEASE_VERSION}"
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: /tmp/release-notes.md

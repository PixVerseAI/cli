name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Resolve tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${TAG#v}" >> $GITHUB_ENV
          echo "Releasing: ${TAG}"

      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install pinned npm for OIDC trusted publishing
        run: npm install -g npm@11.13.0 sigstore@4.0.0

      - name: Verify dist
        run: |
          test -f dist/index.js || { echo "dist/index.js not found"; exit 1; }
          echo "dist/index.js: $(wc -c < dist/index.js) bytes"

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish packages
        run: |
          VERSION="${RELEASE_VERSION}"
          publish_pkg() {
            local name="$1"
            if npm view "${name}@${VERSION}" version > /dev/null 2>&1; then
              echo "✓ ${name}@${VERSION} already published — skipping"
              return 0
            fi
            node -e "
              const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
              pkg.name = '${name}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            npm publish --provenance --access public
            echo "✓ ${name}@${VERSION} published"
          }
          publish_pkg "pixverse"
          publish_pkg "@pixverse-ai/cli"
          publish_pkg "pixverse-cli"
          publish_pkg "pixverse-ai-cli"

      - name: Verify publication
        run: |
          VERSION="${RELEASE_VERSION}"
          verify_pkg() {
            local name="$1"
            for i in 1 2 3 4 5 6; do
              if npm view "${name}@${VERSION}" version > /dev/null 2>&1; then
                echo "✓ ${name}@${VERSION} visible on registry"
                return 0
              fi
              echo "… ${name}@${VERSION} not visible yet (attempt $i), retrying in 10s"
              sleep 10
            done
            echo "✗ ${name}@${VERSION} not visible after 60s"
            return 1
          }
          verify_pkg "pixverse"
          verify_pkg "@pixverse-ai/cli"
          verify_pkg "pixverse-cli"
          verify_pkg "pixverse-ai-cli"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${RELEASE_VERSION}"
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: /tmp/release-notes.md

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Verify dist
        run: |
          test -f dist/index.js || { echo "dist/index.js not found"; exit 1; }
          echo "dist/index.js: $(wc -c < dist/index.js) bytes"

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          publish_pkg() {
            local name="$1"
            if npm view "${name}@${VERSION}" version > /dev/null 2>&1; then
              echo "✓ ${name}@${VERSION} already published — skipping"
              return 0
            fi
            node -e "
              const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
              pkg.name = '${name}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            npm publish --provenance --access public
            echo "✓ ${name}@${VERSION} published"
          }
          publish_pkg "@pixverse-ai/cli"
          publish_pkg "pixverse-cli"
          publish_pkg "pixverse-ai-cli"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          sleep 15
          VERSION="${GITHUB_REF_NAME#v}"
          npm view @pixverse-ai/cli@${VERSION} version
          npm view pixverse-cli@${VERSION} version
          npm view pixverse-ai-cli@${VERSION} version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
